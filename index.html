<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진짜? 가짜! 뉴스 판별 게임</title>
    <style>
        :root {
            /* 19세기 영국풍의 따뜻한 톤으로 색상 변경 */
            --bg-color: #f3ebd9; /* 따뜻한 크림 베이지 */
            --card-bg: #fcfaf2; /* 은은한 양장지 느낌의 아이보리 */
            --true-color: #27ae60;
            --fake-color: #c0392b;
            --text-color: #2c2520; /* 깊은 브라운 블랙 */
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
            position: relative;
            overflow-x: hidden;
        }

        /* -------------------------------------------------------------
           [디자인 추가] 19세기 영국 고풍스러운 건축물 배경 레이어
        ------------------------------------------------------------- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 은은한 영국식 격자 기하학 패턴과 빈티지 그라데이션 */
            background: 
                radial-gradient(circle at 80% 20%, rgba(244, 212, 146, 0.25), transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(212, 175, 55, 0.15), transparent 60%),
                linear-gradient(to bottom, rgba(44, 37, 32, 0.08) 1px, transparent 1px),
                linear-gradient(to right, rgba(44, 37, 32, 0.08) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            z-index: -1;
        }

        /* 하단 고풍스러운 실루엣 장식 (웨스트민스터 및 도심 느낌 형상화) */
        body::after {
            content: "";
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 220px;
            /* 빅벤과 영국 건축물 기둥을 연상시키는 클래식한 스카이라인 패턴 효과 */
            background: linear-gradient(0deg, rgba(218, 175, 116, 0.3) 0%, rgba(218, 175, 116, 0) 100%);
            border-top: 2px solid rgba(218, 175, 116, 0.4);
            z-index: -1;
            pointer-events: none;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .card-container {
            position: relative;
            width: 100%;
            height: 450px;
            margin-bottom: 25px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 20px;
            /* 테두리를 아치형 가구 느낌이 나도록 클래식하게 마감 */
            border: 2px solid #d4af37; /* 고풍스러운 골드 테두리 */
            box-shadow: 0 15px 35px rgba(68, 53, 40, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.4s ease, background-color 0.3s ease, opacity 0.3s ease;
            box-sizing: border-box;
            padding: 20px;
        }

        .card.correct {
            background-color: rgba(46, 204, 113, 0.15);
            border: 3px solid var(--true-color);
        }

        .card.incorrect {
            background-color: rgba(231, 76, 60, 0.15);
            border: 3px solid var(--fake-color);
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
            background-color: #eaeaea;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .card-headline {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.5;
            word-break: keep-all;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            /* 서체 가독성을 위한 앤틱 풍 컬러 */
            color: #3e332a;
        }

        .reason-box {
            margin-top: 15px;
            padding: 12px;
            background-color: rgba(212, 175, 55, 0.15); /* 따뜻한 톤의 설명 박스 */
            border-left: 4px solid #d4af37;
            border-radius: 6px;
            font-size: 0.95rem;
            text-align: center;
            font-weight: 600;
            display: none;
            word-break: keep-all;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .btn {
            flex: 1;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
            color: white;
            box-shadow: 0 4px 12px rgba(68, 53, 40, 0.25);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-true {
            background-color: var(--true-color);
        }

        .btn-fake {
            background-color: var(--fake-color);
        }

        .btn-next {
            background-color: #4a3b32; /* 묵직한 브라운 계열 */
            width: 100%;
            display: none;
        }

        .result-screen {
            background-color: var(--card-bg);
            border-radius: 20px;
            border: 2px solid #d4af37;
            box-shadow: 0 15px 35px rgba(68, 53, 40, 0.2);
            padding: 40px 20px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            display: none;
        }

        .result-score {
            font-size: 3rem;
            font-weight: 800;
            color: #b38f43; /* 빈티지 골드 메인 */
            margin: 20px 0;
        }

        .result-comment {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 25px;
            word-break: keep-all;
        }

        .btn-restart {
            background-color: #4a3b32;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="card-container" id="card-container">
        <div class="card" id="news-card">
            <div id="image-area"></div>
            <div class="card-headline" id="headline-text"></div>
            <div class="reason-box" id="reason-text"></div>
        </div>
    </div>

    <div class="btn-container" id="game-buttons">
        <button class="btn btn-true" onclick="submitAnswer(false)">진짜 O</button>
        <button class="btn btn-fake" onclick="submitAnswer(true)">가짜 X</button>
    </div>
    <button class="btn btn-next" id="next-button" onclick="nextCard()">다음 뉴스 보기</button>

    <div class="result-screen" id="result-screen">
        <h2>🧐 테스트 결과</h2>
        <div class="result-score" id="score-display">0 / 3</div>
        <div class="result-comment" id="comment-display"></div>
        <button class="btn-restart" onclick="restartGame()">다시 도전하기</button>
    </div>
</div>

<script>
    // 제공된 뉴스 데이터 배열
    const quizData = [
        {
            "headline": "충격! 은실이는 중성화한 수컷이다.",
            "isFake": true,
            "reason": "은실이는 암컷이야!!!!!!!!",
            "image": "dndhk.png"
        },
        {
            "headline": "미래동 902호에서 바퀴벌레가 처음으로 등장했음이 밝혀져......",
            "isFake": true,
            "reason": "몰라",
            "image": "ehfl.png"
        },
        {
            "headline": "고려대학교, 육체-정신 분리 인공지능 개발 성공... 학업과 여가를 다른 분신에 맡길 수 있음이 기대돼....",
            "isFake": true,
            "reason": "유감스럽게도 그런 개발같은건 하지 않았다ㅠㅠ",
            "image": "dhdl.png"
        },
        {
            "headline": "7월 9일, 과도하게 자극적인 음식이 급식에 나와 다수의 학생 고통 호소",
            "isFake": false,
            "reason": "진짜 너무너무 매웠다",
            "image": "aodnj.png"
        },
        {
            "headline": "프랭크 와일드혼의 '하루를 28시간으로 사는 법', 26 마노프라이머리 아카데미 신인류상 수상",
            "isFake": true,
            "reason": "프랭크 와일드혼은 작곡가고, 저런 제목의 책은 존재하지도 않으며, 마노프라이머리 아카데미는 영국 초등학교 이름이다",
            "image": "dhdldhdl.png"
        }
    ];

    let currentIndex = 0;
    let score = 0;
    let isAnswered = false;

    const card = document.getElementById('news-card');
    const imageArea = document.getElementById('image-area');
    const headlineText = document.getElementById('headline-text');
    const reasonText = document.getElementById('reason-text');
    const gameButtons = document.getElementById('game-buttons');
    const nextButton = document.getElementById('next-button');
    const resultScreen = document.getElementById('result-screen');
    const cardContainer = document.getElementById('card-container');

    // 게임 초기화 및 카드 렌더링
    function loadCard(index) {
        if (index >= quizData.length) {
            showResult();
            return;
        }

        isAnswered = false;
        card.className = "card"; // 클래스 초기화
        reasonText.style.display = "none";
        gameButtons.style.display = "flex";
        nextButton.style.display = "none";

        const currentQuiz = quizData[index];
        
        // 헤드라인 텍스트 설정
        headlineText.innerText = currentQuiz.headline;

        // 이미지 조건부 렌더링 (null 판별 포함)
        if (currentQuiz.image) {
            imageArea.innerHTML = `<img src="${currentQuiz.image}" class="card-img" alt="뉴스 이미지">`;
        } else {
            imageArea.innerHTML = '';
        }
    }

    // 정답 제출 처리 (사용자가 가짜를 고르면 true를 인자로 넘김)
    function submitAnswer(userChoiceOfFake) {
        if (isAnswered) return;
        isAnswered = true;

        const currentQuiz = quizData[currentIndex];
        const isCorrect = (userChoiceOfFake === currentQuiz.isFake);

        if (isCorrect) {
            score++;
            card.classList.add('correct');
        } else {
            card.classList.add('incorrect');
        }

        // 판별 이유 출력
        reasonText.innerText = `💡 이유: ${currentQuiz.reason}`;
        reasonText.style.display = "block";

        // 버튼 전환
        gameButtons.style.display = "none";
        nextButton.style.display = "block";
    }

    // 다음 카드로 넘어가기
    function nextCard() {
        currentIndex++;
        loadCard(currentIndex);
    }

    // 최종 결과 출력
    function showResult() {
        cardContainer.style.display = "none";
        gameButtons.style.display = "none";
        nextButton.style.display = "none";
        resultScreen.style.display = "block";

        document.getElementById('score-display').innerText = `${score} / ${quizData.length}`;
        
        let comment = "";
        if (score === quizData.length) {
            comment = "🔥 대단해요! 가짜 뉴스 마스터! 선동당하지 않는 지성인이군요.";
        } else if (score >= 1) {
            comment = "👍 제법이군요! 하지만 조금 더 날카로운 눈을 길러봅시다!";
        } else {
            comment = "😭 앗... 혹시 귀가 얇으신 편인가요? 뉴스를 비판적으로 읽어봐요!";
        }
        document.getElementById('comment-display').innerText = comment;
    }

    // 게임 재시작
    function restartGame() {
        currentIndex = 0;
        score = 0;
        cardContainer.style.display = "block";
        resultScreen.style.display = "none";
        loadCard(currentIndex);
    }

    // 앱 시작
    loadCard(currentIndex);
</script>

</body>
</html>
